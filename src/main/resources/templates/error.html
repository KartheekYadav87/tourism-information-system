<!DOCTYPE html>
<!--
    error.html – Custom error fallback page.
-->
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Page Not Found – Tamil Nadu Tourism</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="height: 100vh; display: flex; flex-direction: column;">

<!-- NAVBAR (Simplified) -->
<nav class="navbar navbar-expand-lg" id="mainNavbar">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <i class="fas fa-landmark brand-icon fs-4"></i>
            <div>
                <span class="d-block lh-1" style="font-size:1.15rem; font-weight:800;">TN Tourism</span>
            </div>
        </a>
    </div>
</nav>

<!-- ERROR CONTENT -->
<section class="d-flex align-items-center justify-content-center flex-grow-1" style="background: var(--bg-deep);">
    <div class="container text-center">
        <div style="font-size: 8rem; color: rgba(13,110,253,0.1); line-height: 1; font-weight:800; font-family:'Inter',sans-serif; margin-bottom: -40px; position: relative; z-index: 1;">
            404
        </div>
        <div class="position-relative" style="z-index: 2;">
            <i class="fas fa-compass mb-4" style="font-size: 4rem; color: var(--accent);"></i>
            <h1 class="mb-3">Looks like you've wandered off the trail!</h1>
            <p style="color:var(--text-secondary); max-width: 500px; margin: 0 auto 2rem;">
                The page or destination you are looking for does not exist or might have been moved. 
                Let's get you back on track to exploring Tamil Nadu.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a th:href="@{/}" class="btn-primary-brand">
                    <i class="fas fa-home"></i> Back to Homepage
                </a>
                <a th:href="@{/attractions}" class="btn-outline-brand">
                    <i class="fas fa-map-marked-alt"></i> View Attractions
                </a>
            </div>
        </div>
    </div>
</section>

</body>
</html>
