# Server Configuration
server.port=8081
server.error.whitelabel.enabled=false

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# Application Name
spring.application.name=tourism-information-system

# Logging
logging.level.com.tourism=INFO
logging.level.org.springframework.web=WARN

# Actuator endpoints (for future Prometheus/Grafana integration)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.endpoint.prometheus.enabled=true
management.info.env.enabled=true

# App Info
info.app.name=Tamil Nadu Tourism Information System
info.app.version=1.0.0
info.app.description=A comprehensive portal for discovering Tamil Nadu's attractions, hotels, and travel guides
#Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true